# PulseOps — local development stack (Week 1 / MVP foundation)
# Services talk over the Docker network using service names as hostnames.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulseops
      POSTGRES_PASSWORD: pulseops
      POSTGRES_DB: pulseops
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulseops -d pulseops"]
      interval: 5s
      timeout: 5s
      retries: 5

  media-service:
    build:
      context: ./services/media-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      SERVICE_NAME: media-service
      FAILURE_RATE_PERCENT: "0"
    ports:
      - "8082:8080"

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      SERVICE_NAME: notification-service
    ports:
      - "8083:8080"

  announcement-service:
    build:
      context: ./services/announcement-service
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://pulseops:pulseops@postgres:5432/pulseops
      MEDIA_SERVICE_URL: http://media-service:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:8080
      SERVICE_NAME: announcement-service
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      media-service:
        condition: service_started
      notification-service:
        condition: service_started

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      ANNOUNCEMENT_SERVICE_URL: http://announcement-service:8080
      SERVICE_NAME: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      announcement-service:
        condition: service_started
