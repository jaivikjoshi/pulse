apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: pulseops
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: pulseops
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: api-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api-gateway
        app.kubernetes.io/part-of: pulseops
    spec:
      containers:
        - name: api-gateway
          image: pulse-api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: pulseops-config
                  key: API_GATEWAY_PORT
            - name: SERVICE_NAME
              value: api-gateway
            - name: ANNOUNCEMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: pulseops-config
                  key: ANNOUNCEMENT_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: pulseops
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/part-of: pulseops
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: api-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: announcement-service
  namespace: pulseops
  labels:
    app.kubernetes.io/name: announcement-service
    app.kubernetes.io/part-of: pulseops
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: announcement-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: announcement-service
        app.kubernetes.io/part-of: pulseops
    spec:
      containers:
        - name: announcement-service
          image: pulse-announcement-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: SERVICE_NAME
              value: announcement-service
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
            - name: MEDIA_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: pulseops-config
                  key: MEDIA_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: pulseops-config
                  key: NOTIFICATION_SERVICE_URL
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 8
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: announcement-service
  namespace: pulseops
  labels:
    app.kubernetes.io/name: announcement-service
    app.kubernetes.io/part-of: pulseops
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: announcement-service
  ports:
    - name: http
      port: 8080
      targetPort: http
